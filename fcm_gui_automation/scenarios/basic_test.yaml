name: "basic_pywinauto_poc"
steps:
  - action: "launch_or_connect"
  - action: "set_text"
    target: "key_input"
    value: "sample-key"
  - action: "set_text"
    target: "value_input"
    value: "sample-value"
  - action: "set_text"
    target: "value2_input"
    value: "extra-value"
  - action: "click"
    target: "save_button"
  - action: "verify_text"
    target: "status_box"
    value: "Key: sample-key"
  - action: "screenshot"
    value: "basic_test_success"
  - action: "safe_close"
