name: "basic_pywinauto_poc"
steps:
  - action: "launch_or_connect"
  - action: "set_text"
    group: "Parameter Group"
    target: "parameter_group"
    value: "sample-key"
  - action: "set_text"
    group: "Parameter Group"
    target: "parameter_group_3"
    value: "sample-value"
  - action: "set_text"
    group: "Parameter Group"
    target: "parameter_group_5"
    value: "extra-value"
  - action: "click"
    group: "Operation Group"
    target: "save"
  - action: "verify_text"
    group: "Result Group"
    target: "result_group_2"
    value: "Key: sample-key"
  - action: "screenshot"
    value: "basic_test_success"
  - action: "safe_close"
